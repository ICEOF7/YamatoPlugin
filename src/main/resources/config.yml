# Автор Lama
# Тгк - https://t.me/lamabio
# Сервер: play.lamacraft.ru

item:
  # Название меча в инвентаре
  # Можно использовать обычные &-цвета и теги из блока выше
  name: "<dark_purple>Ямато"

  # Материал предмета.
  # Чаще всего сюда ставят DIAMOND_SWORD или NETHERITE_SWORD
  # Если написать материал с ошибкой, плагин спокойно поставит DIAMOND_SWORD
  material: DIAMOND_SWORD

  # Описание предмета, которое игрок видит при наведении на меч
  # Это нормальный список строк: хочешь новую строку - добавь новый пункт через дефис
  # Пустая строка тоже работает, просто оставь кавычки пустыми: ""
  #
  # Доступные плейсхолдеры:
  # {kills}       сколько убийств уже набрано
  # {need}        сколько убийств нужно для ульты
  # {bar}         полоска заряда ульты
  # {status}      текст готовности ульты
  # {charge_line} готовая строка заряда из item.charge-line
  #
  # Пример обычной правки:
  # - "<gray>Легендарный клинок Вергилия"
  # - "<gray>ПКМ <dark_gray>• <white>Быстрый разрез"
  description:
    - "<dark_gray>Клинок, который режет пространство"
    - ""
    - "<gray>ПКМ <dark_gray>• <white>Judgement Cut"
    - "<gray>Shift + ПКМ <dark_gray>• <white>Dash Slash"
    - "<gray>F <dark_gray>• <white>Stun Cut"
    - "<gray>Shift + прыжок + ЛКМ <dark_gray>• <light_purple>Ульта"
    - ""
    - "{charge_line}"
    - "<gold>Редкость: <light_purple>Легендарное"

  # Готовая строка заряда для описания
  # Её можно вставить в description через {charge_line}
  # Так проще менять заряд в одном месте, а не искать его среди всех строк
  charge-line: "<gray>Заряд ульты: <white>[{bar}] <yellow>{kills}<gray>/<yellow>{need} {status}"

  # Базовый урон обычного удара
  # 7.0 примерно как алмазный меч. 8.0 и выше уже ощущается сильнее ванилы
  base-damage: 7.0

  # Скорость атаки
  # У обычного меча Minecraft около 1.6. Если поставить выше, меч станет быстрее
  attack-speed: 1.6

  # Скрывать стандартные строки Minecraft про урон и скорость атаки
  # Обычно лучше оставить true, чтобы кастомный предмет выглядел аккуратнее
  hide-attributes: true

charge:
  # Сколько убийств мечом нужно набрать для ульты
  kills-needed: 10

  # Длина полоски заряда в описании предмета
  # 10 обычно выглядит ровно и не растягивает описание
  bar-length: 10

  # Символы полоски заряда
  # Если на сервере криво отображаются квадраты, можно заменить на | и
  bar-filled: "█"
  bar-empty: "░"

  # Текст рядом с зарядом ульты
  ready-text: "<green>(Готово)"
  not-ready-text: "<red>(Не готово)"

combo:
  # true значит, что комбо усиливает только базовый урон Yamato
  # false будет умножать итоговый урон, включая внешние бонусы от других плагинов
  apply-to-base-only: true

  # Окно комбо в миллисекундах
  # Если игрок не ударил за это время, счётчик начнётся заново
  window-ms: 1200

  # Максимум стаков комбо
  max: 5

  # Бонус урона за каждый стак после первого
  # 0.05 это +5%, 0.10 это +10%.
  damage-bonus-per-stack: 0.05

  # Показывать счётчик комбо над хотбаром
  show-actionbar: true

  # На каком стаке выдавать скорость
  speed-at: 3

  # На каком стаке выдавать силу
  strength-at: 5

  # Длительность баффов от комбо в тиках
  # 20 тиков это примерно 1 секунда
  buff-duration-ticks: 40

ult-input:
  # Ульта срабатывает через Shift + прыжок + ЛКМ
  # Это окно говорит, сколько миллисекунд после прыжка ещё можно поймать ЛКМ
  jump-window-ms: 600

  # Проверка движения для ульты
  # Если ульта срабатывает слишком легко, уменьши значение
  # Если игрокам тяжело активировать ульту, немного увеличь
  still-threshold: 0.05

self-stun:
  # На сколько тиков владелец Yamato замирает после Stun Cut
  f-ticks: 60

  # Дополнительная задержка владельца после ульты
  # Нужна, чтобы ульта ощущалась как законченная анимация, а не резкий телепорт
  ult-ticks-extra: 10

cooldowns-ms:
  # Все кулдауны указаны в миллисекундах
  # 1000 это 1 секунда, 60000 это 1 минута
  judgement-cut: 1300
  dash: 6500
  stun-cut: 12000
  ult: 60000

judgement-cut:
  # Дальность точки, куда прилетает разрез
  range: 25.0

  # Радиус урона вокруг точки попадания
  radius: 2.6

  # Урон способности до множителя комбо
  damage: 6.0

dash:
  # Количество шагов рывка
  # Больше шагов даёт более длинный и плавный рывок
  steps: 10

  # Дистанция одного шага рывка
  step-distance: 0.85

  # Радиус, в котором рывок задевает врагов
  hit-radius: 1.65

  # Урон по каждому врагу, которого задел рывок
  damage: 4.0

stun-cut:
  # Дальность зоны перед игроком
  range: 5.0

  # Радиус заморозки и будущего удара
  radius: 4.0

  # На сколько тиков враги замораживаются
  freeze-ticks: 60

  # Через сколько тиков после заморозки пройдёт урон
  damage-delay-ticks: 60

  # Урон после задержки
  damage: 9.0

ult-style:
  # Как часто владелец Yamato делает быстрый скачок во время ульты
  step-interval-ticks: 2

  # Радиус скачков вокруг центра ульты
  owner-hop-radius: 2.6

  # Радиус урона вокруг владельца на каждом скачке
  step-damage-radius: 2.2

  # Урон одного шага ульты
  step-damage: 2.2

  # Как часто рисуется большой визуальный всплеск
  ring-burst-interval-ticks: 10

ult:
  # Радиус всей зоны ульты
  radius: 7.5

  # Длительность ульты в тиках
  duration-ticks: 90

messages:
  # Здесь все сообщения плагина
  # Их можно менять без Java и без новой сборки jar
  # Плейсхолдеры вроде {player}, {seconds}, {kills} лучше не удалять,
  # иначе игроки не увидят важные числа или имена

  command:
    no-permission: "<red>У тебя нет прав на эту команду"
    usage: "<gray>Использование: <white>/yamato give [player] <gray>или <white>/yamato reload"
    reloaded: "<green>YamatoPlugin перезагружен. Конфиг применён"
    player-not-found: "<red>Игрок не найден"
    give-sender: "<green>Yamato выдан игроку <yellow>{player}<green>"
    give-target: "<dark_purple>Ты получил Yamato"

  actionbar:
    combo: "<gray>Комбо: <yellow>{count}<gray>/<yellow>{max}"
    judgement-cut-cooldown: "<red>Judgement Cut: <gray>кд {seconds}s"
    dash-cooldown: "<red>Dash Slash: <gray>кд {seconds}s"
    stun-cut-cooldown: "<red>Stun Cut: <gray>кд {seconds}s"
    ult-not-ready: "<red>Ульта не готова: <yellow>{kills}<gray>/<yellow>{need}"
    ult-cooldown: "<red>Ульта: <gray>кд {seconds}s"

